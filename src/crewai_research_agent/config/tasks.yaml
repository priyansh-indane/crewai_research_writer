research_task:
  description: >
    Find 3-5 interesting and recent facts about {topic}.
  expected_output: >
    A bullet list of 3-5 facts.
  agent: researcher

writing_task:
  description: >
    Write a 100-word blog post summary about {topic} using the facts from the research.
  expected_output: >
    A blog post summary.
  agent: writer
  context:
    - research_task
   
